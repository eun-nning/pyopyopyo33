<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>표표표3 노래 모음</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 로고 -->
  <div class="title-wrapper">
    <a href="https://www.sooplive.com/station/pyo32o" target="_blank">
      <img src="logo.png" class="title-logo">
    </a>
  </div>

  <!-- 검색 -->
  <input type="text" id="searchInput" placeholder="제목 또는 가수 검색">

  <!-- 정렬 + 페이지 -->
  <div class="controls">
    <button onclick="showAll()">전체</button>
    <button onclick="showFavoritesPage()">★ 즐겨찾기</button>
    <button onclick="sortByNewest()">최신순</button>
    <button onclick="sortByOldest()">오래된순</button>
  </div>

  <!-- 태그 -->
  <div class="tags">
    <button onclick="filterByTag('노래뱅')">노래뱅</button>
    <button onclick="filterByTag('커버곡')">커버곡</button>
    <button onclick="filterByTag('노래조각')">노래조각</button>
  </div>

  <!-- 테이블 -->
  <table>
    <thead>
      <tr>
        <th>제목</th>
        <th>가수</th>
        <th>날짜</th>
        <th>태그</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="songTable"></tbody>
  </table>

</div>

<script src="script.js?v=3"></script>
</body>
</html>
